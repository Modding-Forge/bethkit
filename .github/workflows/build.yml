name: Build

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------------
  # Lint: rustfmt check + clippy on Linux only (fast, no matrix needed).
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-latest-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --tests -- --deny warnings

  # -------------------------------------------------------------------------
  # Build + unit tests on all supported platforms.
  # Integration tests are excluded because they require real game files that
  # cannot be committed to the repository (see .gitignore / tests/testdata/).
  # -------------------------------------------------------------------------
  build:
    needs: lint
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: bethkit-windows-x64
            dll: target/release/bethkit_ffi.dll
            lib: target/release/bethkit_ffi.lib
          - os: ubuntu-latest
            artifact-name: bethkit-linux-x64
            dll: target/release/libbethkit_ffi.so
            lib: target/release/libbethkit_ffi.a

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cache the cargo registry and build artefacts to speed up subsequent runs.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Unit tests only — integration tests require real plugin/archive files.
      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Build release DLL
        run: cargo build --release -p bethkit-ffi --features generate-header

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.dll }}
            ${{ matrix.lib }}
            crates/bethkit-ffi/bethkit.h
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Create a GitHub Release when a version tag (v*) is pushed and attach all
  # platform artifacts.
  # -------------------------------------------------------------------------
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bethkit-windows-x64
          path: dist/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bethkit-linux-x64
          path: dist/linux

      # Zip each platform bundle for the release page.
      - name: Package artifacts
        run: |
          (cd dist/windows && zip -r ../../bethkit-${{ github.ref_name }}-windows-x64.zip .)
          (cd dist/linux   && zip -r ../../bethkit-${{ github.ref_name }}-linux-x64.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            bethkit-${{ github.ref_name }}-windows-x64.zip
            bethkit-${{ github.ref_name }}-linux-x64.zip
